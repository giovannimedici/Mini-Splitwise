services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MinisplitwiseDb: ${ConnectionStrings__MinisplitwiseDb}
      Jwt__Key: ${Jwt__Key}
    volumes:
      - sqlite-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite-data:

